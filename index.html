<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="logo">✨ Gallery</h1>
            <div class="nav-links">
                <a href="#gallery" class="nav-link">Gallery</a>
                <a href="#about" class="nav-link">About</a>
                <a href="#contact" class="nav-link">Contact</a>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h2>Visual Gallery</h2>
            <p>Explore our curated collection of stunning imagery</p>
        </div>
    </section>

    <!-- Gallery Grid -->
    <main class="gallery-container">
        <div class="gallery">
            <div class="gallery-item">
                <img src="IMG_20250620_140131_040.webp" alt="My Photo">
                <div class="overlay">
                    <div class="overlay-content">
                        <h3>My Photo</h3>
                        <p>A beautiful moment captured</p>
                    </div>
                </div>
            </div>

            <div class="gallery-item">
                <img src="IMG_20260108_084022_087.webp" alt="Bloodline">
                <div class="overlay">
                    <div class="overlay-content">
                        <h3>Bloodline</h3>
                        <p>Kshatriya</p>
                    </div>
                </div>
            </div>

            <div class="gallery-item">
                <img src="IMG_20260217_151242.jpg" alt="Hard Lines">
                <div class="overlay">
                    <div class="overlay-content">
                        <h3>Hard Lines</h3>
                        <p>Abstract</p>
                    </div>
                </div>
            </div>

            <div class="gallery-item">
                <img src="IMG_20260226_101601_831.webp" alt="Funny">
                <div class="overlay">
                    <div class="overlay-content">
                        <h3>Funny</h3>
                        <p>Humorous</p>
                    </div>
                </div>
            </div>

            <div class="gallery-item">
                <img src="Snapchat-456347839.jpg" alt="Nature">
                <div class="overlay">
                    <div class="overlay-content">
                        <h3>Nature</h3>
                        <p>Nature</p>
                    </div>
                </div>
            </div>

            <div class="gallery-item">
                <img src="Snapchat-1064682619.jpg" alt="Temple">
                <div class="overlay">
                    <div class="overlay-content">
                        <h3>Temple</h3>
                        <p>Historical</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 Premium Gallery. All rights reserved.</p>
    </footer>
</body>
</html>
